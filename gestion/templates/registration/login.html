<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:10px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#0d6efd;
            color:white;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0b5ed7;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>Connexion</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Login</button>
            Se connecter
        </button>

    </form>

</div>

</body>
</html>
