<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f5f7fb;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;

            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#0d6efd;
        }

        form p{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;

            border:1px solid #ccc;
            border-radius:10px;

            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#0d6efd;
        }

        button{
            width:100%;
            padding:12px;

            border:none;
            border-radius:10px;

            background:#0d6efd;
            color:white;

            cursor:pointer;
            font-size:16px;
            font-weight:600;

            transition:0.2s;
        }

        button:hover{
            background:#0b5ed7;
        }

        .errorlist{
            list-style:none;
            color:#dc3545;
            margin-bottom:10px;
            font-size:14px;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h2>Connexion</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Se connecter
            </button>

        </form>

    </div>

</body>
</html>
