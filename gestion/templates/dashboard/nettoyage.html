{% extends "gestion/html/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" 
    href="{% static 'gestion/css/nettoyage.css' %}">

<div class="container-fluid nettoyage-page">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div class="d-flex align-items-center gap-3">

            <button 
                class="btn btn-secondary btn-retour"
                onclick="history.back()">

                ← Retour

            </button>


            <h2 class="mb-0">
                🗑️ Nettoyage des activités
            </h2>

        </div>


        <div class="d-flex gap-2">

            <input type="date"
                   id="datePicker"
                   class="form-control">

            <button class="btn btn-primary"
                    onclick="chargerActivites()">

                Rechercher

            </button>

        </div>

    </div>

    <div class="row">

        <!-- LISTE ACTIVITES -->

        <div class="col-lg-4">

            <div class="card shadow-sm">

                <div class="card-header bg-primary text-white">

                    Activités du jour

                </div>

                <div class="card-body p-0">

                    <div id="listeActivites"
                         style="max-height:75vh; overflow-y:auto;">

                        <div class="text-center p-4 text-muted">

                            Sélectionnez une date

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- DETAILS -->

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-header bg-success text-white">

                    Détails de l'activité

                </div>

                <div class="card-body"
                     id="detailsActivite"
                     style="min-height:75vh;">

                    <div class="text-center text-muted mt-5">

                        Cliquez sur une activité pour voir les détails

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const liste = document.getElementById("listeActivites");
const details = document.getElementById("detailsActivite");

function chargerActivites() {

    const date = document.getElementById("datePicker").value;

    if (!date) {
        alert("Veuillez choisir une date");
        return;
    }

    liste.innerHTML = `
        <div class="text-center p-3">
            Chargement...
        </div>
    `;

    fetch(`/ajax/activites/?date=${date}`)

        .then(response => response.json())

        .then(data => {

            liste.innerHTML = "";

            if (data.length === 0) {

                liste.innerHTML = `
                    <div class="text-center p-4 text-muted">
                        Aucune activité trouvée
                    </div>
                `;

                return;
            }

            data.forEach(act => {

                liste.innerHTML += `

                    <div class="border-bottom p-3 activite-item"
                         style="cursor:pointer"
                         data-id="${act.id}"
                         data-client="${act.client}"
                         data-service="${act.service}"
                         data-montant="${act.montant}"
                         data-date="${act.date}"
                         data-heure="${act.heure}"
                         data-details="${act.details}"
                         data-mode="${act.mode_paiement}">

                        <strong>${act.client}</strong>

                        <br>

                        <small class="text-muted">
                            ${act.date}
                        </small>

                    </div>

                `;

            });

            bindActivites();

        });

}

function bindActivites() {

    document.querySelectorAll(".activite-item").forEach(item => {

        item.addEventListener("click", function() {

            details.innerHTML = `

                <div class="mb-4">

                    <h3>${this.dataset.client}</h3>

                    <hr>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="card mb-3">

                                <div class="card-body">

                                    <h6>Service</h6>

                                    <p>
                                        ${this.dataset.service}
                                    </p>

                                </div>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="card mb-3">

                                <div class="card-body">

                                    <h6>Montant</h6>

                                    <p>
                                        ${this.dataset.montant} FCFA
                                    </p>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="card mb-3">

                        <div class="card-body">

                            <h6>Date</h6>

                            <p>
                                ${this.dataset.date}
                                à
                                ${this.dataset.heure}
                            </p>

                        </div>

                    </div>


                    <div class="card mb-3">

                        <div class="card-body">

                            <h6>Mode paiement</h6>

                            <p>
                                ${this.dataset.mode}
                            </p>

                        </div>

                    </div>


                    <div class="card mb-3">

                        <div class="card-body">

                            <h6>Détails</h6>

                            <p>
                                ${this.dataset.details || "Aucun détail"}
                            </p>

                        </div>

                    </div>

                    <button
                        class="btn btn-danger"
                        onclick="supprimerActivite(${this.dataset.id})">

                        🗑️ Supprimer cette activité

                    </button>

                </div>

            `;

        });

    });

}

function supprimerActivite(id) {

    if (!confirm("Supprimer cette activité ?")) {
        return;
    }

    fetch(`/ajax/delete-activite/${id}/`, {

        method: "POST",

        headers: {
            "X-CSRFToken": getCookie("csrftoken")
        }

    })

    .then(response => response.json())

    .then(data => {

        if (data.success) {

            details.innerHTML = `

                <div class="alert alert-success">

                    Activité supprimée avec succès

                </div>

            `;

            chargerActivites();

        } else {

            alert("Erreur lors de la suppression");

        }

    });

}

function getCookie(name) {

    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {

        const cookies = document.cookie.split(';');

        for (let i = 0; i < cookies.length; i++) {

            const cookie = cookies[i].trim();

            if (cookie.substring(0, name.length + 1) === (name + '=')) {

                cookieValue = decodeURIComponent(
                    cookie.substring(name.length + 1)
                );

                break;

            }

        }

    }

    return cookieValue;

}

</script>

{% endblock %}
