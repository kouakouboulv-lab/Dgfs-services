{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgf-services</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
        }

        .navbar{
            background:white !important;
            border-bottom:2px solid #0d6efd;
            box-shadow:0 4px 15px rgba(13,110,253,0.12);
            padding:10px 20px;
        }

        .navbar-brand{
            display:flex;
            align-items:center;
            gap:10px;
            font-weight:700;
            color:#0d6efd !important;
            white-space:nowrap;
        }

        .navbar-brand img{
            height:42px;
            width:auto;
            max-height:45px;
            object-fit:contain;
            border-radius:8px;
            border:2px solid #0d6efd;
            background:white;
            padding:2px;
        }

        .nav-link{
            color:#0d6efd !important;
            font-weight:500;
            margin-left:10px;
            transition:0.3s;
            border-radius:8px;
            padding:8px 12px !important;
        }

        .nav-link:hover{
            background:#eaf2ff;
            color:#0039a6 !important;
        }

        .user-box{
            display:flex;
            align-items:center;
            gap:12px;
            margin-left:20px;
        }

        .username{
            font-weight:600;
            color:#333;
        }

        .logout-btn{
            background:#dc3545;
            color:white !important;
            padding:8px 14px;
            border-radius:10px;
            text-decoration:none;
            transition:0.3s;
            font-weight:500;
        }

        .logout-btn:hover{
            background:#bb2d3b;
        }

        .main-container{
            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 2px 12px rgba(0,0,0,0.05);
            margin-top:25px;
            margin-bottom:30px;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light sticky-top">

    <div class="container-fluid">

        <a class="navbar-brand" href="{% url 'journal' %}">
            <img src="{% static 'img/logo.png' %}" alt="Logo">
            Dgf-services
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'journal' %}">
                        <i class="bi bi-journal-text"></i> Journal
                    </a>
                </li>

                <!-- ✅ CORRIGÉ -->
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'mise_a_jour_registre' %}">
                        <i class="bi bi-arrow-clockwise"></i> Mise à jour
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'statistiques' %}">
                        <i class="bi bi-search"></i> Statistiques
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'historique' %}">
                        <i class="bi bi-calendar-event"></i> Historique
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'export_pdf' %}">
                        <i class="bi bi-printer"></i> PDF
                    </a>
                </li>

                {% if user.is_authenticated %}

                <li class="nav-item user-box">

                    <span class="username">
                        <i class="bi bi-person-circle"></i>
                        {{ user.username }}
                    </span>

                    <a class="logout-btn" href="{% url 'logout' %}">
                        Déconnexion
                    </a>

                </li>

                {% endif %}

            </ul>

        </div>

    </div>

</nav>

<div class="container-fluid mt-4 px-4">

    <div class="main-container">

        {% block content %}
        {% endblock %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
