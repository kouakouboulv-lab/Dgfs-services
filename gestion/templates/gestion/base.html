{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGF-SERVICES</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background: white !important;
            border-bottom: 2px solid #0d6efd;
            box-shadow: 0 4px 15px rgba(13,110,253,0.12);
        }

        /* LOGO + BRAND */
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            font-weight: bold;
            color: #0d6efd !important;
        }

        .navbar-brand img {
            height: 42px;
            width: 42px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #0d6efd;
        }

        /* LINKS */
        .nav-link {
            color: #0d6efd !important;
            font-weight: 500;
            margin-left: 8px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #0039a6 !important;
            transform: translateY(-1px);
        }

        /* CONTENT */
        .main-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light sticky-top">
  <div class="container-fluid">

    <!-- LOGO -->
    <a class="navbar-brand" href="{% url 'journal' %}">
        <img src="{% static 'img/logo.png' %}" alt="Logo">
        DGF-SERVICES
    </a>

    <!-- MOBILE BUTTON -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- MENU -->
    <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'journal' %}">
                    <i class="bi bi-journal-text"></i> Journal
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'dashboard' %}">
                    <i class="bi bi-graph-up"></i> Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'recherche' %}">
                    <i class="bi bi-search"></i> Recherche
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'historique' %}">
                    <i class="bi bi-calendar-event"></i> Historique
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'export_pdf' %}">
                    <i class="bi bi-printer"></i> PDF
                </a>
            </li>

        </ul>
    </div>

  </div>
</nav>

<!-- CONTENU -->
<div class="container mt-4">
    <div class="main-container">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
